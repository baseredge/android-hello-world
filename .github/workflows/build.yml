name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        run: |
          ANDROID_HOME=${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" --sdk_root=${ANDROID_HOME}

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        id: build
        run: |
          ./gradlew assembleDebug 2>&1 | tee build-output.txt
          echo "BUILD_EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: List APK output
        run: find app/build/outputs/apk -type f 2>/dev/null || echo "no apk dir"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Report Failure to Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try {
              log = fs.readFileSync('build-output.txt', 'utf8');
            } catch (e) {
              log = '(could not read build output)';
            }
            const lines = log.split('\n');
            const errorStart = lines.findIndex(l => l.includes('FAILURE:'));
            const tail = errorStart >= 0
              ? lines.slice(errorStart, Math.min(lines.length, errorStart + 60)).join('\n')
              : lines.slice(-60).join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Build failure at ${context.sha.substring(0, 7)}`,
              body: `## Build Error Log\n\`\`\`\n${tail}\n\`\`\``,
              labels: ['bug']
            });
