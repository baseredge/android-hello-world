name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        run: |
          ANDROID_HOME=${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" --sdk_root=${ANDROID_HOME}

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug > gradle-output.txt 2>&1

      - name: List APK output
        run: find app/build -name "*.apk" -type f 2>/dev/null || echo "no apk found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/**/*.apk
          if-no-files-found: error

      - name: Report Failure to Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try {
              log = fs.readFileSync('gradle-output.txt', 'utf8');
            } catch (e) {
              log = '(could not read output)';
            }
            const lines = log.split('\n');
            const errorStart = lines.findIndex(l => l.includes('FAILURE:'));
            const tail = errorStart >= 0
              ? lines.slice(errorStart, Math.min(lines.length, errorStart + 80)).join('\n')
              : lines.slice(-80).join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Build failure at ' + context.sha.substring(0, 7),
              body: '```\n' + tail + '\n```',
              labels: ['bug']
            });
